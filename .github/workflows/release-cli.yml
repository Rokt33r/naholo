name: Release CLI

on:
  push:
    tags:
      - '@naholo/cli@*' # e.g. @naholo/cli@0.12.0

permissions:
  id-token: write # OIDC for npm Trusted Publishing — no NPM_TOKEN
  contents: read

jobs:
  release:
    name: Build and publish CLI to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @naholo/cli build

      - name: Publish to npm
        run: pnpm --filter @naholo/cli publish --no-git-checks
