version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: naholo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: naholo
      POSTGRES_PASSWORD: naholo
      POSTGRES_DB: naholo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
